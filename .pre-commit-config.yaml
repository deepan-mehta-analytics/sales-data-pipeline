# =============================================================================
# .pre-commit-config.yaml
# Pre-commit hook configuration for the Superstore Sales Data Pipeline.
#
# Pre-commit runs a set of code quality checks automatically before every
# git commit.  If any hook fails, the commit is aborted, and the developer
# must fix the reported issue before committing.
#
# Setup:
#   pip install pre-commit        # Install the pre-commit tool
#   pre-commit install            # Register the hooks with git
#
# Manual run (without committing):
#   pre-commit run --all-files    # Run all hooks against every file
# =============================================================================

# Minimum pre-commit version required to run this configuration.
minimum_pre_commit_version: "3.4.0"

repos:

  # ---------------------------------------------------------------------------
  # pre-commit-hooks
  # A collection of lightweight, language-agnostic hooks maintained by
  # the pre-commit project.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0   # Pin to a specific tag for reproducibility
    hooks:

      - id: trailing-whitespace      # Remove trailing spaces from every line
        name: Remove trailing whitespace

      - id: end-of-file-fixer        # Ensure every file ends with a newline
        name: Fix end of file

      - id: check-yaml               # Validate YAML files are parseable
        name: Check YAML syntax

      - id: check-json               # Validate JSON files are parseable
        name: Check JSON syntax

      - id: check-merge-conflict     # Prevent committing unresolved merge markers
        name: Check for merge conflicts

      - id: check-added-large-files  # Block commits of files > 5 MB
        name: Block large file commits
        args: ["--maxkb=5120"]       # 5 MB limit in kilobytes

      - id: debug-statements         # Prevent committing pdb/ipdb/breakpoint()
        name: Check for debug statements

  # ---------------------------------------------------------------------------
  # black — opinionated Python code formatter
  # Automatically reformats Python files to a consistent style.
  # black modifies files in-place; if it changes anything the commit is
  # blocked so the developer can review the changes and re-stage.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 23.12.1   # Pin to a specific release
    hooks:
      - id: black
        name: Format with black
        language_version: python3     # Use the system Python 3 interpreter
        args: ["--line-length=120"]   # Match the line length in pyproject.toml

  # ---------------------------------------------------------------------------
  # isort — Python import sorter
  # Sorts import statements into: stdlib → third-party → first-party groups.
  # The 'black' profile ensures isort's output is compatible with black.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2   # Pin to a specific release
    hooks:
      - id: isort
        name: Sort imports with isort
        args: ["--profile=black", "--line-length=120"]

  # ---------------------------------------------------------------------------
  # flake8 — PEP 8 linter
  # Reports style violations and potential errors.  Unlike black and isort,
  # flake8 does NOT modify files — it only reports issues.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0   # Pin to a specific release
    hooks:
      - id: flake8
        name: Lint with flake8
        args:
          - "--max-line-length=120"   # Match the line length in pyproject.toml
          - "--extend-ignore=E203"    # E203: whitespace before ':' (black-compatible)
        exclude: |
          (?x)^(
            \.git/|
            __pycache__/|
            \.venv/|
            build/|
            dist/
          )$
