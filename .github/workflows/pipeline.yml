# =============================================================================
# .github/workflows/pipeline.yml
# Scheduled pipeline execution workflow.
#
# Runs the full ETL pipeline on a daily schedule and on manual trigger,
# demonstrating that the pipeline can be operated without human intervention.
# In a production deployment this would trigger against a cloud data source;
# here it runs against the bronze CSV file committed to the repository.
#
# v1.1 additions:
#   - Installs requirements-profiling.txt for the ydata-profiling HTML report
#   - Uploads the profiling HTML report as a named build artefact
# =============================================================================

name: Pipeline — Daily ETL Run   # Workflow name shown in the GitHub Actions UI

on:
  schedule:
    - cron: "0 6 * * *"          # Run every day at 06:00 UTC (before business hours)
  workflow_dispatch:              # Also allow manual trigger from the GitHub Actions UI

jobs:
  run-pipeline:
    name: Run full ETL pipeline
    runs-on: ubuntu-latest        # Latest Ubuntu GitHub-hosted runner

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Check out the latest code on the default branch
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v6   # Official GitHub checkout action

      # -----------------------------------------------------------------------
      # Step 2: Install Python 3.11
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Step 3: Cache pip packages — key covers all requirements files
      # -----------------------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-pipeline-${{ hashFiles('requirements*.txt') }}   # Invalidates on any dep change
          restore-keys: pip-pipeline-

      # -----------------------------------------------------------------------
      # Step 4: Install production + profiling dependencies
      # requirements-profiling.txt adds ydata-profiling for the HTML report;
      # it is intentionally excluded from the base requirements.txt to keep
      # the Docker image lean.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip              # Upgrade pip itself first
          pip install -r requirements.txt                  # Core production dependencies
          pip install -r requirements-profiling.txt        # ydata-profiling for HTML report

      # -----------------------------------------------------------------------
      # Step 5: Run the full ETL pipeline (Bronze → Silver → Gold → DuckDB)
      # Stages 7 and 8 (drift detection + profiling) run automatically after load.
      # -----------------------------------------------------------------------
      - name: Run pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}   # Required for 'from src...' imports
        run: python orchestration/pipeline.py

      # -----------------------------------------------------------------------
      # Step 6: Upload pipeline logs — always, even if the pipeline failed
      # -----------------------------------------------------------------------
      - name: Upload pipeline logs
        if: always()                             # Upload logs even if the pipeline fails
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-logs-${{ github.run_number }}   # Unique name per run
          path: logs/pipeline.log                         # JSON-structured run log
          if-no-files-found: warn                         # Warn (not error) if log is missing

      # -----------------------------------------------------------------------
      # Step 7: Upload gold Parquet outputs — only on a successful run
      # -----------------------------------------------------------------------
      - name: Upload gold outputs
        if: success()                            # Only upload outputs on a successful run
        uses: actions/upload-artifact@v5
        with:
          name: gold-outputs-${{ github.run_number }}
          path: data/gold/                       # All five gold Parquet files

      # -----------------------------------------------------------------------
      # Step 8: Upload the HTML profiling report — only on a successful run
      # The report is generated by src/quality/profiler.py via ydata-profiling.
      # -----------------------------------------------------------------------
      - name: Upload profiling report
        if: success()                            # Only upload if the pipeline succeeded
        uses: actions/upload-artifact@v5
        with:
          name: profiling-report-${{ github.run_number }}   # Unique name per run
          path: reports/                                      # HTML report + any other report files
          if-no-files-found: warn                             # Warn if profiling was skipped
