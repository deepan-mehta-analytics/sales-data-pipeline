name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # Checkout repository
      # --------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Set up Python environment
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # Install dependencies
      # --------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # --------------------------------------------------
      # Code formatting check (Black)
      # --------------------------------------------------
      - name: Check formatting with Black
        run: |
          black --check src tests orchestration

      # --------------------------------------------------
      # Import sorting check (isort)
      # --------------------------------------------------
      - name: Check imports with isort
        run: |
          isort --check-only src tests orchestration

      # --------------------------------------------------
      # Linting (flake8)
      # --------------------------------------------------
      - name: Lint with flake8
        run: |
          flake8 src tests orchestration \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc

      # --------------------------------------------------
      # Run tests (pytest)
      # --------------------------------------------------
      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q

      # --------------------------------------------------
      # Optional: Generate coverage (if enabled later)
      # --------------------------------------------------
      - name: Generate coverage report
        run: |
          pytest --cov=src --cov-report=xml || true

      # --------------------------------------------------
      # Upload coverage artifact (non-blocking)
      # --------------------------------------------------
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()